services:
  # Background Worker (Trigger-style)
  trigger-bg:
    platform: linux/arm64
    build: ./trigger-bg
    restart: unless-stopped
    ports: ["3001:3001"]
    depends_on:
      - redis
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - TRIGGER_API_KEY=${TRIGGER_API_KEY:-change-me}
      - TRIGGER_QUEUE_NAME=${TRIGGER_QUEUE_NAME:-ai-jobs}
      - TRIGGER_WORKER_CONCURRENCY=${TRIGGER_WORKER_CONCURRENCY:-5}
      - TRIGGER_READ_RATE_LIMIT=${TRIGGER_READ_RATE_LIMIT:-300}
      - TRIGGER_WRITE_RATE_LIMIT=${TRIGGER_WRITE_RATE_LIMIT:-60}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Link Shortener (Dub-style)
  dub-links:
    platform: linux/arm64
    build: ./dub-links
    restart: unless-stopped
    ports: ["3000:3000"]
    depends_on:
      db-links:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_LINKS_USER:-postgres}:${DB_LINKS_PASSWORD:-password}@db-links:5432/${DB_LINKS_NAME:-dublinks}?sslmode=disable
      - DUB_API_KEY=${DUB_API_KEY:-change-me}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3000}
      - DUB_READ_RATE_LIMIT=${DUB_READ_RATE_LIMIT:-300}
      - DUB_WRITE_RATE_LIMIT=${DUB_WRITE_RATE_LIMIT:-60}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend-as-a-Service (PocketBase-style)
  pocket-base:
    platform: linux/arm64
    build: ./pocket-base
    restart: unless-stopped
    ports: ["8080:8080"]
    volumes:
      - ./pocket-base/pb_data:/pb/pb_data
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Real-time Chat (Papercups-style)
  paper-cups:
    platform: linux/arm64
    build: ./paper-cups
    restart: unless-stopped
    ports: ["4000:4000"]
    environment:
      - PAPER_WS_TOKEN=${PAPER_WS_TOKEN:-}
      - PAPER_RATE_LIMIT=${PAPER_RATE_LIMIT:-240}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Coolify-style PaaS control plane
  coolify-paas:
    platform: linux/arm64
    build: ./coolify-paas
    restart: unless-stopped
    ports: ["3002:3002"]
    environment:
      - COOLIFY_RATE_LIMIT=${COOLIFY_RATE_LIMIT:-180}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Hoppscotch-style API testing workspace
  hopp-test:
    platform: linux/arm64
    build: ./hopp-test
    restart: unless-stopped
    ports: ["3003:3003"]
    environment:
      - HOPP_RATE_LIMIT=${HOPP_RATE_LIMIT:-180}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Infrastructure Dependencies
  redis:
    platform: linux/arm64
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  db-links:
    platform: linux/arm64
    image: postgres:alpine
    restart: unless-stopped
    volumes:
      - db-links-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_LINKS_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_LINKS_PASSWORD:-password}
      POSTGRES_DB: ${DB_LINKS_NAME:-dublinks}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_LINKS_USER:-postgres} -d ${DB_LINKS_NAME:-dublinks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    platform: linux/arm64
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      trigger-bg:
        condition: service_healthy
      dub-links:
        condition: service_healthy
      pocket-base:
        condition: service_healthy
      paper-cups:
        condition: service_healthy
      coolify-paas:
        condition: service_healthy
      hopp-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db-links-data:
