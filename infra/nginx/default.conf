server {
  listen 80;
  server_name _;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /trigger/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/trigger/(.*)$ /$1 break;
    proxy_pass http://trigger-bg:3001;
  }

  location /dub/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/dub/(.*)$ /$1 break;
    proxy_pass http://dub-links:3000;
  }

  location /pocket/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/pocket/(.*)$ /$1 break;
    proxy_pass http://pocket-base:8080;
  }

  location /coolify/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/coolify/(.*)$ /$1 break;
    proxy_pass http://coolify-paas:3002;
  }

  location /hopp/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/hopp/(.*)$ /$1 break;
    proxy_pass http://hopp-test:3003;
  }

  location /paper/ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://paper-cups:4000/ws;
  }

  location /paper/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/paper/(.*)$ /$1 break;
    proxy_pass http://paper-cups:4000;
  }

  location / {
    default_type application/json;
    return 200 '{"gateway":"ok","routes":["/trigger/","/dub/","/pocket/","/paper/","/coolify/","/hopp/"]}';
  }
}
