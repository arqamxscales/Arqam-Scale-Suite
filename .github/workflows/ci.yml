name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null \
              && curl -fsS http://localhost:3001/health >/dev/null \
              && curl -fsS http://localhost:3002/health >/dev/null \
              && curl -fsS http://localhost:3003/health >/dev/null \
              && curl -fsS http://localhost:4000/health >/dev/null \
              && curl -fsS http://localhost:8080/health >/dev/null \
              && curl -fsS http://localhost/healthz >/dev/null; then
              break
            fi
            sleep 2
          done

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose down -v
